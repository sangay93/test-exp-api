name: Deploy Mule Application to CloudHub

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: self-hosted
    environment: PROD

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build & Deploy
         env:
            ANYPOINT_CLIENT_ID: ${{ secrets.ANYPOINT_CLIENT_ID }}
            ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
            ANYPOINT_ORG_ID: ${{ secrets.ANYPOINT_ORG_ID }}
          run: |
            mvn clean deploy -DmuleDeploy \
              -Dapp.name=${{ vars.APP_NAME }} \
              -Ddeploy.environment=${{ vars.DEPLOY_ENVIRONMENT }} \
              -Dworkers=${{ vars.WORKERS }} \
              -DworkerType=${{ vars.WORKER_TYPE }} \
              -Dregion=${{ vars.REGION }}
          
       
